<script>
function toggleDropdown() {
  var dd = document.getElementById('profile-dropdown');
  dd.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  var chip = document.getElementById('profile-chip');
  var dd = document.getElementById('profile-dropdown');
  if (!chip.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove('open');
  }
});

  

  function exitPage() {
  window.location.href = 'https://www.google.com';
}
</script>

<script>
var allGames = [];
var filteredGames = [];
var currentPage = 1;
var perPage = 24;

fetch('https://glseries.net/api/cdn')
  .then(function(r){ return r.json(); })
  .then(function(json){
    allGames = json.data || [];
    filteredGames = allGames;
    renderPage(1);
  })
  .catch(function(e){ console.error('Failed to load games', e); });

document.getElementById('game-search-input').addEventListener('input', function(){
  var q = this.value.toLowerCase();
  filteredGames = allGames.filter(function(g){
    return g.title.toLowerCase().includes(q) || (g.category||'').toLowerCase().includes(q);
  });
  renderPage(1);
});

function renderPage(page) {
  currentPage = page;
  var start = (page - 1) * perPage;
  var pageGames = filteredGames.slice(start, start + perPage);
  var grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  pageGames.forEach(function(g){
    var card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = '<img src="' + g.thumbnail + '" alt="' + g.title + '" loading="lazy">' +
      '<div class="game-card-title">' + g.title + '</div>' +
      '<div class="game-card-cat">' + (g.category || '') + '</div>';
    card.addEventListener('click', function(){ openGame(g); });
    grid.appendChild(card);
  });
  renderPagination();
  document.getElementById('content-area').scrollTop = 0;
}

function renderPagination() {
  var total = Math.ceil(filteredGames.length / perPage);
  var pg = document.getElementById('games-pagination');
  pg.innerHTML = '';
  if (total <= 1) return;

  function btn(label, page, active) {
    var b = document.createElement('button');
    b.textContent = label;
    if (active) b.classList.add('active');
    b.addEventListener('click', function(){ renderPage(page); });
    pg.appendChild(b);
  }

  if (currentPage > 1) btn('Prev', currentPage - 1, false);
  var start = Math.max(1, currentPage - 2);
  var end = Math.min(total, currentPage + 2);
  for (var i = start; i <= end; i++) btn(i, i, i === currentPage);
  if (currentPage < total) btn('Next', currentPage + 1, false);
}

function openGame(g) {
  document.getElementById('game-modal-title').textContent = g.title;
  document.getElementById('game-modal-frame').src = g.embed_url;
  document.getElementById('game-modal').classList.add('open');
}

function closeGame() {
  document.getElementById('game-modal').classList.remove('open');
  document.getElementById('game-modal-frame').src = '';
}
</script>
